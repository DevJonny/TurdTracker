name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/TurdTracker.Tests/TurdTracker.Tests.csproj

      - name: Build
        run: dotnet build tests/TurdTracker.Tests/TurdTracker.Tests.csproj --no-restore

      - name: Test
        run: dotnet test tests/TurdTracker.Tests/TurdTracker.Tests.csproj --no-build --verbosity normal
